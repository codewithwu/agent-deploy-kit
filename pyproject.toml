[project]
name = "myproject"
version = "0.1.0"
description = "A Python project"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.136.1",
    "langchain>=1.3.7",
    "langchain-nvidia-ai-endpoints>=1.4.1",
    "langchain-ollama>=1.1.0",
    "langchain-openai>=1.3.0",
    "python-dotenv>=1.2.2",
    "uvicorn>=0.46.0",
]


[[tool.uv.index]]
url = "https://pypi.tuna.tsinghua.edu.cn/simple"
default = true

[dependency-groups]
dev = [
    "mypy>=1.20.2",
    "pytest>=9.0.3",
    "ruff>=0.15.11",
    "ipykernel==6.30.1",
]


[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["agents*",]
exclude = ["jupyter*", "tests*"]